<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#0a0f18"/>
  
  <!-- Pipe network -->
  <!-- Vertical pipe left -->
  <rect x="52" y="30" width="16" height="80" rx="8" fill="#5580b0"/>
  <!-- Horizontal pipe middle -->
  <rect x="52" y="88" width="88" height="16" rx="8" fill="#5580b0"/>
  <!-- Vertical pipe right -->
  <rect x="124" y="88" width="16" height="74" rx="8" fill="#5580b0"/>
  <!-- Short horizontal top right -->
  <rect x="100" y="30" width="56" height="16" rx="8" fill="#5580b0"/>
  <!-- Vertical pipe top right -->
  <rect x="140" y="30" width="16" height="48" rx="8" fill="#5580b0"/>

  <!-- Junction nodes -->
  <circle cx="60" cy="96" r="11" fill="#7ab0e0"/>
  <circle cx="132" cy="96" r="11" fill="#7ab0e0"/>
  <circle cx="60" cy="36" r="11" fill="#7ab0e0"/>
  <circle cx="148" cy="36" r="11" fill="#7ab0e0"/>
  <circle cx="148" cy="78" r="11" fill="#7ab0e0"/>

  <!-- Exit node (orange) -->
  <circle cx="132" cy="154" r="13" fill="#ff6600"/>

  <!-- Ball (red) rolling down right pipe -->
  <circle cx="132" cy="124" r="10" fill="#ff4422"/>

  <!-- Start node (green) -->
  <circle cx="60" cy="36" r="9" fill="#00ee66"/>
</svg>
