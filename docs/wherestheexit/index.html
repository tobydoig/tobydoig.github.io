    mazeGroup.add(m);
  }
  for (const n of maze.nodes) {
    if (n.edges.length >= 2 && !n.isCenter && !n.isStart) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(PIPE_R * 1.01, 14, 10), pipeMat.clone());
      m.position.copy(n.pos); m.userData.midpoint = n.pos; m.userData.matType = 'pipe';
      mazeGroup.add(m);
    }
    if (n.isLeaf && !n.isStart && !n.isCenter) {
      const nbr = n.edges[0]; const nb = nbr.a === n ? nbr.b : nbr.a;
      const dir = new THREE.Vector3().subVectors(n.pos, nb.pos).normalize();
      const m = new THREE.Mesh(new THREE.CircleGeometry(PIPE_R, 12), junctionMat.clone());
      m.position.copy(n.pos); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
      m.userData.midpoint = n.pos; m.userData.matType = 'junction';
      mazeGroup.add(m);
    }
    if (n.isCenter) {
      const m = new THREE.Mesh(centerGeo, centerMat.clone());
      m.position.copy(n.pos); m.userData.midpoint = n.pos; m.userData.matType = 'center';
      mazeGroup.add(m);
    }
    if (n.isStart) {
      const m = new THREE.Mesh(startGeo, startMat.clone());
      m.position.copy(n.pos); m.userData.midpoint = n.pos; m.userData.matType = 'start';
      mazeGroup.add(m);
    }
  }
  applyTheme();
  mazeGroup.quaternion.set(0,0,0,1);
  mazeGroup.position.set(0,0,0);

  let maxDist = 0;
  maze.nodes.forEach(n => { maxDist = Math.max(maxDist, n.pos.length()); });

  // Save/restore camera frustum
  const savedCL = camera.left, savedCR = camera.right, savedCT = camera.top, savedCB = camera.bottom;
  const savedCamPos = camera.position.clone(), savedCamUp = camera.up.clone();

  function setSplashCamera(W, H) {
    const asp = W / H;
    const vd = maxDist * 1.5;
    camera.left = -vd * asp; camera.right = vd * asp;
    camera.top = vd; camera.bottom = -vd;
    camera.updateProjectionMatrix();
    const d = maxDist * 5;
    camera.position.set(d * 0.7, d * 0.55, d * 0.7);
    camera.up.set(0, 1, 0);
    // Shift lookAt so maze appears centered: offset right and up in world space
    // (panel offset ~1/4 width left = shift target right, 1/4 down = shift target up)
    const offset = new THREE.Vector3(vd * asp * 0.5 - PIPE_R, vd * 0.5, 0);
    camera.lookAt(offset);
  }

  function applyDepthShading() {
    const t = THEMES.dark;
    for (const child of mazeGroup.children) {
      if (!child.material || !child.userData.midpoint) continue;
      const mp = child.userData.midpoint.clone();
      mazeGroup.localToWorld(mp);
      const d = camera.position.distanceTo(mp);
      const f = Math.max(0, Math.min(1, 1 - (d - maxDist) / (maxDist * 5)));
      const base = new THREE.Color(t[child.userData.matType] ?? t.pipe);
      child.material.color.setRGB(base.r * (0.25 + 0.75 * f), base.g * (0.25 + 0.75 * f), base.b * (0.25 + 0.75 * f));
    }
  }

  let splashAngle = 0.5, target = null, splashRunning = true;

  function splashFrame() {
    if (!splashRunning) return;
    requestAnimationFrame(splashFrame);
    if (!document.getElementById('splash').classList.contains('show')) return;

    const container = document.getElementById('splash-maze');
    const W = container.offsetWidth, H = container.offsetHeight;
    if (!W || !H) return;

    const pr = Math.min(window.devicePixelRatio, 2);
    const tw = Math.floor(W * pr), th = Math.floor(H * pr);

    if (!target || target.width !== tw || target.height !== th) {
      if (target) target.dispose();
      target = new THREE.WebGLRenderTarget(tw, th);
    }

    splashAngle += 0.004;
    mazeGroup.rotation.y = splashAngle;
    // Keep exit (center node) at world origin so it's centered in the panel
    mazeGroup.updateMatrixWorld();
    if (maze && maze.center) {
      const ew = maze.center.pos.clone().applyMatrix4(mazeGroup.matrixWorld);
      mazeGroup.position.sub(ew);
    }
    setSplashCamera(W, H);
    applyDepthShading();

    renderer.setRenderTarget(target);
    renderer.setViewport(0, 0, tw, th);
    renderer.setScissorTest(false);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);

    // Copy pixels to splash canvas
    const pixels = new Uint8Array(tw * th * 4);
    renderer.readRenderTargetPixels(target, 0, 0, tw, th, pixels);
    const cvs = document.getElementById('splash-canvas');
    if (!cvs) return;
    cvs.width = tw; cvs.height = th;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    const ctx = cvs.getContext('2d');
    const imgData = ctx.createImageData(tw, th);
    // Flip Y (WebGL origin is bottom-left, canvas is top-left)
    for (let y = 0; y < th; y++) {
      const src = (th - 1 - y) * tw * 4;
      imgData.data.set(pixels.subarray(src, src + tw * 4), y * tw * 4);
    }
    ctx.putImageData(imgData, 0, 0);
  }

  setTimeout(splashFrame, 50);

  function restoreGame() {
    splashRunning = false;
    if (target) { target.dispose(); target = null; }
    mazeLevel = savedLevel; mazeScheme = savedScheme; mazeR = savedR;
    currentSeed = savedSeed; debugSeedOverride = savedDebugSeed; debugR = savedDebugR;
    camera.left = savedCL; camera.right = savedCR;
    camera.top = savedCT; camera.bottom = savedCB;
    camera.position.copy(savedCamPos); camera.up.copy(savedCamUp);
    camera.updateProjectionMatrix();
    mazeGroup.rotation.y = 0;
    mazeGroup.quaternion.copy(savedQuat);
    mazeGroup.position.copy(savedPos);
    buildGeometry(); initBall(); showPreview();
  }

  document.getElementById('splash-btn').addEventListener('click', restoreGame, { once: true });
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
