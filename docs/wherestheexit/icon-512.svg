  <!-- Junction nodes -->
  <circle cx="159" cy="255" r="29" fill="#7ab0e0"/>
  <circle cx="353" cy="255" r="29" fill="#7ab0e0"/>
  <circle cx="159" cy="101" r="29" fill="#7ab0e0"/>
  <circle cx="393" cy="101" r="29" fill="#7ab0e0"/>
  <circle cx="393" cy="208" r="29" fill="#7ab0e0"/>

