  <!-- Horizontal pipe middle -->
  <rect x="138" y="234" width="236" height="42" rx="21" fill="#5580b0"/>
  <!-- Vertical pipe right -->
  <rect x="332" y="234" width="42" height="198" rx="21" fill="#5580b0"/>
  <!-- Horizontal pipe top right -->
